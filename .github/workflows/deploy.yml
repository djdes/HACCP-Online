name: Deploy to production

on:
  push:
    branches: [master]
  # Fallback trigger — run the same workflow manually from the Actions
  # UI when the `push` hook silently doesn't fire (e.g. GitHub Actions
  # minutes exhausted, workflow auto-paused after inactivity, or runner
  # outage). Use "Run workflow" on the Deploy to production page.
  workflow_dispatch: {}

env:
  APP_DIR: /var/www/wesetupru/data/www/wesetup.ru/app
  # Must be >= 22 — undici@8 requires Node 20.18+, and the prod server
  # runs Node 22. Keep the CI and prod runtimes aligned to avoid
  # "engines" mismatches during npm ci.
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare CI env for build
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          else
            echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/postgres" >> .env
          fi

      - name: Generate Prisma client for CI build
        run: npx prisma generate

      - name: Write build markers
        run: |
          # Just timestamps — actual build runs on the prod host so that
          # .next references the same node_modules that PM2 will load.
          echo "${{ github.sha }}" > .build-sha
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .build-time

      - name: Create deploy tarball
        run: |
          # ВАЖНО: `--exclude=journals` (без `./`) матчится любой папкой
          # `journals` в дереве, в т.ч. `src/app/(dashboard)/journals/`,
          # `src/app/api/journals/`, `src/app/mini/journals/` — после
          # extract на проде пропадали все роуты журналов и сайт отдавал
          # «Страница не найдена». Ставим `./journals` чтобы анкорить на
          # корень репо — исключаются только source-данные, не код.
          tar cf deploy.tar \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=public/screenshots \
            --exclude=.git \
            --exclude=.github \
            --exclude=.claude \
            --exclude=.vscode \
            --exclude=.agent \
            --exclude=./journals \
            --exclude=./tmp-source-journals \
            --exclude=_run.py \
            --exclude=_deploy.py \
            --exclude=_seed_remote.py \
            --exclude=haccp-deploy.tar \
            --exclude='*.tar' \
            --exclude='*.tar.gz' \
            --exclude='./prod-*.png' \
            --exclude='./animations*.png' \
            --exclude='./screenshot-*.png' \
            --exclude=test.txt \
            .

      - name: Prepare app directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            mkdir -p ${{ env.APP_DIR }}
            # Backup .env if it exists
            [ -f ${{ env.APP_DIR }}/.env ] && cp ${{ env.APP_DIR }}/.env ${{ env.APP_DIR }}/.env.bak || true

      - name: Upload tarball via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: deploy.tar
          target: ${{ env.APP_DIR }}

      - name: Run deploy commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          timeout: 600s
          command_timeout: 10m
          script: |
            set -eo pipefail
            cd ${{ env.APP_DIR }}

            echo "=== Cleaning stale source (keeps .env, node_modules, tarball) ==="
            # Source dirs below are fully owned by the repo — nuke them before
            # extraction so renamed/deleted files (e.g. src/app/(mini) moved
            # to src/app/mini) don't leave orphans that collide with the new
            # tree and break Next.js route resolution.
            rm -rf src scripts prisma public .github docs .agent journals tmp-source-journals

            echo "=== Extracting tarball ==="
            tar xf deploy.tar && rm deploy.tar
            # Restore .env from backup if it exists
            [ -f .env.bak ] && cp .env.bak .env || true

            echo "=== Installing server dependencies (clean) ==="
            # Remove stale node_modules + CI-produced .next to prevent
            # "Cannot find module 'next/dist/compiled/cookie'" desync after
            # npm ci replaces packages referenced by the bundled CI build.
            [ -s ~/.nvm/nvm.sh ] && . ~/.nvm/nvm.sh || true
            # npm ci падает с ENOTEMPTY когда прошлый build оставил файлы
            # в node_modules/*/lib-vendor — стараемся вычистить жёстко.
            # Второй rm-rf покрывает race если первый упал посередине.
            rm -rf node_modules .next node_modules/.cache 2>/dev/null || true
            sleep 1
            rm -rf node_modules .next 2>/dev/null || true
            npm ci --no-audit --no-fund 2>&1 | tail -5 || (
              echo "npm ci failed, retrying after deeper clean" && \
              rm -rf node_modules ~/.npm/_cacache && \
              npm ci --no-audit --no-fund 2>&1 | tail -5
            )

            echo "=== Generating Prisma client ==="
            npx prisma generate 2>&1 | tail -5

            echo "=== Building Next.js on prod ==="
            # Build на том же хосте, где устанавливались node_modules,
            # чтобы пути внутри .next всегда резолвились в свежие пакеты.
            npm run build 2>&1 | tail -10

            echo "=== Verifying client-reference manifests ==="
            # Next.js 16 периодически собирается «успешно», но без
            # client-reference-manifest.js файлов в .next/server/app —
            # SSR HTML отдаётся, но React не может гидрировать (особенно
            # на мобильных, где нет кэша) и страницы выглядят рабочими
            # на ПК и сломанными на телефоне. Если такая ситуация —
            # ребилдим один раз с чистой папкой; если опять не помогло —
            # фейлим деплой явно, чтобы PM2 не подхватил битый build.
            #
            # Проверяем И общее количество, И конкретно `_not-found`
            # manifest — у Next.js 16 был случай (build ea9bb4b)
            # когда manifest-ов было 199, но именно `_not-found` отсутствовал,
            # и каждый 404 на проде выкидывал InvariantError → React не
            # рендерился. Так что проверяем точечно самый критичный.
            verify_manifests() {
              local total
              total=$(find .next/server/app -name '*client-reference-manifest.js' 2>/dev/null | wc -l)
              if [ "$total" -lt "5" ]; then
                echo "[fail] only $total manifests"
                return 1
              fi
              if [ ! -f .next/server/app/_not-found/page_client-reference-manifest.js ]; then
                echo "[fail] _not-found/page_client-reference-manifest.js missing"
                return 1
              fi
              echo "[ok] $total manifests + _not-found present"
              return 0
            }

            if ! verify_manifests; then
              echo "[warn] manifest check failed — rebuilding from clean .next"
              rm -rf .next
              npm run build 2>&1 | tail -10
              if ! verify_manifests; then
                echo "[fail] manifests still bad after rebuild — aborting deploy"
                exit 1
              fi
            fi

            echo "=== Pushing schema to DB ==="
            # prisma db push зависит от `dotenv/config` в prisma.config.ts.
            # В node_modules он есть, но иногда резолвер prisma его не
            # находит если запустить `npx` без предварительной подгрузки
            # env. Заранее экспортируем переменные из .env.
            if [ -f .env ]; then
              set -a; . ./.env; set +a
            fi
            npx prisma db push 2>&1 | tail -5

            echo "=== Seeding journal templates ==="
            if [ -f .env ]; then
              npx tsx prisma/seed.ts 2>&1 | tail -20
              echo "=== Seeding job positions (idempotent) ==="
              npx tsx prisma/seed-job-positions.ts 2>&1 | tail -5
              echo "=== Seeding journal fill modes + cleanup (idempotent) ==="
              npx tsx prisma/seed-journal-fill-modes.ts 2>&1 | tail -5
              echo "=== Seeding blog articles (idempotent) ==="
              npx tsx prisma/seed-articles.ts 2>&1 | tail -5
              echo "=== Running bot wizard tests ==="
              npx tsx scripts/test-bot-wizard.ts 2>&1 | tail -40 || echo "[warn] bot wizard tests failed — deploy continues"
              echo "=== Seeding demo-screenshots org (idempotent) ==="
              npx tsx prisma/seed-demo-screenshots.ts 2>&1 | tail -5
            else
              echo ".env not found, skip seed"
            fi

            echo "=== Restarting PM2 (web + telegram poller) ==="
            npx pm2 delete haccp-online 2>/dev/null || true
            # next start по умолчанию слушает :3000, но nginx проксирует
            # на :3002 — явно указываем порт, иначе процесс падает
            # с EADDRINUSE когда на 3000 висит другое приложение.
            npx pm2 start "npx next start -p 3002" --name haccp-online --cwd "$(pwd)" --update-env 2>&1 | tail -5

            # Long-polling daemon для Telegram — webhook у прод-nginx
            # уходит на dead upstream в ~50% случаев (пользователи видят
            # 503 Tunnel Unavailable), править nginx без sudo нельзя,
            # так что ходим за апдейтами сами через прямой коннект к
            # api.telegram.org (с TELEGRAM_FORCE_IP). Grammy автоматом
            # снимет webhook при bot.start(), так что оба канала не
            # конкурируют.
            npx pm2 delete haccp-telegram-poller 2>/dev/null || true
            npx pm2 start "npx tsx scripts/telegram-poller.ts" --name haccp-telegram-poller --cwd "$(pwd)" --update-env 2>&1 | tail -5

            npx pm2 save --force 2>&1 | tail -2
            npx pm2 status --no-color | grep -E 'haccp|name|---' || true

            echo "=== Deploy complete ==="
