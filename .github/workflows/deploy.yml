name: Deploy to production

on:
  push:
    branches: [master]
  # Fallback trigger — run the same workflow manually from the Actions
  # UI when the `push` hook silently doesn't fire (e.g. GitHub Actions
  # minutes exhausted, workflow auto-paused after inactivity, or runner
  # outage). Use "Run workflow" on the Deploy to production page.
  workflow_dispatch: {}

# Serialize prod-deploys. Без этого блока два push'а в master запускали
# два workflow-run'а в параллель, и оба пытались `pm2 delete haccp-online`
# + `pm2 start` одновременно — race на бинарнике + .next/. Иногда прод
# оставался без процесса.
#
# cancel-in-progress: false — каждый run докатывается до конца. Свежий
# push становится pending; повторные push'и вытесняют его в очереди
# (последний выигрывает), но активный run не убивается до pm2 reload.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  APP_DIR: /var/www/wesetupru/data/www/wesetup.ru/app
  # Must be >= 22 — undici@8 requires Node 20.18+, and the prod server
  # runs Node 22. Keep the CI and prod runtimes aligned to avoid
  # "engines" mismatches during npm ci.
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare CI env for build
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          else
            echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/postgres" >> .env
          fi

      - name: Generate Prisma client for CI build
        run: npx prisma generate

      - name: Write build-time only (sha записывается на проде до build)
        run: |
          # КРИТИЧНО: .build-sha НЕ пишем тут. Если запишем — он попадёт
          # в tar и при failed build на проде /api/health показывал бы
          # «свежий» sha притом что новый код не задеплоен.
          # Sha пишем НА ПРОДЕ перед `npm run build` — next.config.ts
          # читает его в getBuildId() и запекает в NEXT_PUBLIC_BUILD_ID.
          # Если build/verify упадёт — PM2 не рестартует, старый процесс
          # с старым запечённым sha продолжает жить.
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .build-time

      - name: Create deploy tarball
        run: |
          # ВАЖНО: `--exclude=journals` (без `./`) матчится любой папкой
          # `journals` в дереве, в т.ч. `src/app/(dashboard)/journals/`,
          # `src/app/api/journals/`, `src/app/mini/journals/` — после
          # extract на проде пропадали все роуты журналов и сайт отдавал
          # «Страница не найдена». Ставим `./journals` чтобы анкорить на
          # корень репо — исключаются только source-данные, не код.
          tar cf deploy.tar \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=public/screenshots \
            --exclude=.git \
            --exclude=.github \
            --exclude=.claude \
            --exclude=.vscode \
            --exclude=.agent \
            --exclude=./journals \
            --exclude=./tmp-source-journals \
            --exclude=_run.py \
            --exclude=_deploy.py \
            --exclude=_seed_remote.py \
            --exclude=haccp-deploy.tar \
            --exclude='*.tar' \
            --exclude='*.tar.gz' \
            --exclude='./prod-*.png' \
            --exclude='./animations*.png' \
            --exclude='./screenshot-*.png' \
            --exclude=test.txt \
            .

      - name: Prepare app directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            mkdir -p ${{ env.APP_DIR }}
            # Backup .env if it exists
            [ -f ${{ env.APP_DIR }}/.env ] && cp ${{ env.APP_DIR }}/.env ${{ env.APP_DIR }}/.env.bak || true

      - name: Upload tarball via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: deploy.tar
          target: ${{ env.APP_DIR }}

      - name: Run deploy commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASS }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          # Пробрасываем github.sha как env-переменную внутрь SSH-сессии,
          # чтобы скрипт мог записать .build-sha ДО `npm run build`
          # (next.config.ts читает его в getBuildId и запекает в
          # NEXT_PUBLIC_BUILD_ID — без этого healthz возвращал sha
          # *предыдущего* деплоя).
          envs: GITHUB_SHA
          timeout: 600s
          command_timeout: 10m
          script: |
            set -eo pipefail
            cd ${{ env.APP_DIR }}
            export GITHUB_SHA="${{ github.sha }}"

            echo "=== Cleaning stale source (keeps .env, node_modules, tarball) ==="
            # Source dirs below are fully owned by the repo — nuke them before
            # extraction so renamed/deleted files (e.g. src/app/(mini) moved
            # to src/app/mini) don't leave orphans that collide with the new
            # tree and break Next.js route resolution.
            rm -rf src scripts prisma public .github docs .agent journals tmp-source-journals

            echo "=== Extracting tarball ==="
            tar xf deploy.tar && rm deploy.tar
            # Restore .env from backup if it exists
            [ -f .env.bak ] && cp .env.bak .env || true

            echo "=== Backup OLD .next/static (chunks survive deploy window) ==="
            # R40 fix: PM2 продолжает обслуживать СТАРЫЙ HTML до конца
            # деплоя (его restart — последний шаг). Старый HTML ссылается
            # на старые chunk-имена (/_next/static/chunks/<hash>.js),
            # которые `rm -rf .next` ниже удаляет → активные пользователи
            # получают 500 на КАЖДЫЙ JS chunk на ~30-60 сек, пока build
            # идёт. Решение: бэкапим .next/static, и после build'а
            # копируем СТАРЫЕ chunks обратно в .next/static (имена hash'ами,
            # с новыми не конфликтуют — coexist'ят). После pm2 restart
            # они становятся dead-weight и стираются на следующем деплое
            # (тем же rm -rf .next). Window 500's закрыт.
            rm -rf .next.static-backup 2>/dev/null || true
            if [ -d .next/static ]; then
              mv .next/static .next.static-backup
              echo "[backup] .next/static → .next.static-backup ($(find .next.static-backup -type f | wc -l) files)"
            else
              echo "[backup] .next/static отсутствует — нечего бэкапить (первый деплой?)"
            fi

            echo "=== Installing server dependencies (clean) ==="
            # Remove stale node_modules + CI-produced .next to prevent
            # "Cannot find module 'next/dist/compiled/cookie'" desync after
            # npm ci replaces packages referenced by the bundled CI build.
            [ -s ~/.nvm/nvm.sh ] && . ~/.nvm/nvm.sh || true
            # npm ci падает с ENOTEMPTY когда прошлый build оставил файлы
            # в node_modules/*/lib-vendor — стараемся вычистить жёстко.
            # Второй rm-rf покрывает race если первый упал посередине.
            rm -rf node_modules .next node_modules/.cache 2>/dev/null || true
            sleep 1
            rm -rf node_modules .next 2>/dev/null || true
            npm ci --no-audit --no-fund 2>&1 | tail -5 || (
              echo "npm ci failed, retrying after deeper clean" && \
              rm -rf node_modules ~/.npm/_cacache && \
              npm ci --no-audit --no-fund 2>&1 | tail -5
            )

            echo "=== Generating Prisma client ==="
            npx prisma generate 2>&1 | tail -5

            echo "=== Writing .build-sha до build (next.config.ts читает его в getBuildId() и запекает NEXT_PUBLIC_BUILD_ID в bundle) ==="
            # Раньше .build-sha писали ПОСЛЕ build'а — и каждый деплой
            # запекал в JS bundle SHA *прошлого* деплоя (off-by-one):
            # next build читал .build-sha с диска до того, как новый sha
            # туда записывался → /api/healthz возвращал старый sha
            # притом что код был свежий. Решение: писать BEFORE build.
            #
            # Безопасно ли это? Да: если build потом упадёт, set -eo
            # pipefail или verify_manifests прервут деплой ДО pm2
            # restart'а. Старый PM2-процесс останется жить со своим
            # запечённым SHA. Disk-state не утекает в runtime пока
            # next build не завершится успехом.
            echo "$GITHUB_SHA" > .build-sha

            echo "=== Building Next.js on prod ==="
            # Build на том же хосте, где устанавливались node_modules,
            # чтобы пути внутри .next всегда резолвились в свежие пакеты.
            #
            # Stale .next/lock от прошлого упавшего build'а ломает все
            # следующие deploy'и: `next build` сразу выходит с «Unable to
            # acquire lock» и оставляет .next/server/app пустым, а
            # verify_manifests раньше (до strict-check) пропускал такое
            # как «зелёный» — пользователи видели «Что-то пошло не так»
            # на /root/organizations/[id], /mini и пр. Удаляем lock'и
            # перед каждой попыткой.
            rm -f .next/lock 2>/dev/null || true
            npm run build 2>&1 | tail -10

            echo "=== Restoring OLD .next/static chunks (R40 fix) ==="
            # cp -n = no-clobber: новые chunks от свежего build'а имеют
            # приоритет, ничего не перезаписываем. Старые chunks с
            # уникальными hash-именами просто доезжают рядом — их
            # запрашивают пользователи которые уже загрузили СТАРУЮ
            # HTML до pm2 restart.
            if [ -d .next.static-backup ]; then
              # Restore только chunks/ (где живут JS бандлы) и css/.
              # media/ — fonts/images, тоже могут быть нужны.
              for sub in chunks css media; do
                if [ -d ".next.static-backup/$sub" ]; then
                  mkdir -p ".next/static/$sub"
                  cp -rn ".next.static-backup/$sub/." ".next/static/$sub/" 2>/dev/null || true
                fi
              done
              restored=$(find .next.static-backup -type f | wc -l)
              echo "[restore] $restored old static files preserved alongside new build"
              rm -rf .next.static-backup
            else
              echo "[restore] no backup — пропуск (первый деплой / build с нуля)"
            fi

            echo "=== Verifying client-reference manifests ==="
            # Next.js 16 периодически собирается «успешно», но без
            # client-reference-manifest.js файлов в .next/server/app —
            # SSR HTML отдаётся, но React не может гидрировать (особенно
            # на мобильных, где нет кэша) и страницы выглядят рабочими
            # на ПК и сломанными на телефоне. Если такая ситуация —
            # ребилдим один раз с чистой папкой; если опять не помогло —
            # фейлим деплой явно, чтобы PM2 не подхватил битый build.
            #
            # Per-route check: для КАЖДОГО page.js должен лежать рядом
            # page_client-reference-manifest.js. Это ловит и случай
            # «manifest-ов мало вообще», и «manifest-ов много, но для
            # конкретного route отсутствует» — последний крашил
            # /root/organizations/[id], /mini и пр. с InvariantError.
            verify_manifests() {
              # Sanity: build вообще должен был сгенерировать .next/server/app.
              # Если его нет — `find` молча вернёт пусто, и loop ниже отдаст
              # missing=0 → false-positive «всё ок». Проверяем явно.
              if [ ! -d .next/server/app ]; then
                echo "[fail] .next/server/app отсутствует — build не дошёл до compilation"
                return 1
              fi
              local pages
              pages=$(find .next/server/app -name 'page.js' 2>/dev/null | wc -l)
              if [ "$pages" -lt "10" ]; then
                echo "[fail] всего $pages page.js — build явно неполный (ожидаем 80+)"
                return 1
              fi
              local missing=0
              local missing_list=""
              while IFS= read -r page_js; do
                [ -z "$page_js" ] && continue
                local dir
                dir=$(dirname "$page_js")
                if [ ! -f "$dir/page_client-reference-manifest.js" ]; then
                  missing=$((missing+1))
                  missing_list="$missing_list ${dir#.next/server/app/}"
                fi
              done < <(find .next/server/app -name 'page.js' 2>/dev/null)
              if [ "$missing" -gt "0" ]; then
                echo "[fail] $missing routes без client-reference-manifest:"
                for r in $missing_list; do echo "  - $r"; done
                return 1
              fi
              local total
              total=$(find .next/server/app -name '*client-reference-manifest.js' 2>/dev/null | wc -l)
              echo "[ok] $pages page-routes, все имеют manifest ($total файлов)"
              return 0
            }

            if ! verify_manifests; then
              echo "[warn] manifest check failed — rebuilding from clean .next"
              # Полный rm -rf — заодно убирает stale .next/lock который
              # мог остаться от первого build'а, упавшего на OOM.
              rm -rf .next
              npm run build 2>&1 | tail -10
              if ! verify_manifests; then
                echo "[fail] manifests still bad after rebuild — aborting deploy"
                exit 1
              fi
            fi

            echo "=== Pushing schema to DB ==="
            # prisma db push зависит от `dotenv/config` в prisma.config.ts.
            # В node_modules он есть, но иногда резолвер prisma его не
            # находит если запустить `npx` без предварительной подгрузки
            # env. Заранее экспортируем переменные из .env.
            if [ -f .env ]; then
              set -a; . ./.env; set +a
            fi
            npx prisma db push 2>&1 | tail -5

            echo "=== Seeding journal templates ==="
            if [ -f .env ]; then
              npx tsx prisma/seed.ts 2>&1 | tail -20
              echo "=== Seeding job positions (idempotent) ==="
              npx tsx prisma/seed-job-positions.ts 2>&1 | tail -5
              echo "=== Seeding journal fill modes + cleanup (idempotent) ==="
              npx tsx prisma/seed-journal-fill-modes.ts 2>&1 | tail -5
              echo "=== Seeding blog articles (idempotent) ==="
              npx tsx prisma/seed-articles.ts 2>&1 | tail -5
              echo "=== Running bot wizard tests ==="
              npx tsx scripts/test-bot-wizard.ts 2>&1 | tail -40 || echo "[warn] bot wizard tests failed — deploy continues"
              echo "=== Seeding demo-screenshots org (idempotent) ==="
              npx tsx prisma/seed-demo-screenshots.ts 2>&1 | tail -5
            else
              echo ".env not found, skip seed"
            fi

            echo "=== Restarting PM2 (web + telegram poller) ==="
            npx pm2 delete haccp-online 2>/dev/null || true
            # next start по умолчанию слушает :3000, но nginx проксирует
            # на :3002 — явно указываем порт, иначе процесс падает
            # с EADDRINUSE когда на 3000 висит другое приложение.
            npx pm2 start "npx next start -p 3002" --name haccp-online --cwd "$(pwd)" --update-env 2>&1 | tail -5

            # Long-polling daemon для Telegram — webhook у прод-nginx
            # уходит на dead upstream в ~50% случаев (пользователи видят
            # 503 Tunnel Unavailable), править nginx без sudo нельзя,
            # так что ходим за апдейтами сами через прямой коннект к
            # api.telegram.org (с TELEGRAM_FORCE_IP). Grammy автоматом
            # снимет webhook при bot.start(), так что оба канала не
            # конкурируют.
            npx pm2 delete haccp-telegram-poller 2>/dev/null || true
            npx pm2 start "npx tsx scripts/telegram-poller.ts" --name haccp-telegram-poller --cwd "$(pwd)" --update-env 2>&1 | tail -5

            npx pm2 save --force 2>&1 | tail -2
            npx pm2 status --no-color | grep -E 'haccp|name|---' || true

            # Pre-warm основных публичных routes. Next.js 16 Turbopack
            # JIT-компилирует client reference manifest при первом hit'е
            # — пока он не построен, первые ~30-90 секунд после restart'а
            # пользователи получают 500 + «Invariant: client reference
            # manifest does not exist» в логах. Curl'ем сами разогреваем
            # popular страницы, public traffic идёт уже на готовое.
            echo "=== Pre-warming routes ==="
            # 10s sleep — pm2 нужно полностью встать. Если делать
            # запрос раньше — curl получает connection-reset.
            sleep 10
            # Покрываем И публичные routes (для landing-traffic), И приватные
            # (для logged-in management/staff). Приватные redirect'ятся
            # на /login (307), но это после того как `page.tsx` успел
            # загрузиться — что и компилирует client reference manifest.
            # Иначе на первый auth-request пользователи видят
            # «Invariant: client reference manifest does not exist» и
            # 500 в браузере (особенно заметно на мобильных, где они
            # часто открывают /journals/[code] первым делом).
            #
            # Дефолтный slug для динамических routes — `cleaning`
            # (стабильный templateCode из ACTIVE_JOURNAL_CATALOG).
            # Для documents-route — `_warm` (fake doc-id, страница
            # вернёт 404 но manifest скомпилируется).
            # Последний путь `/__deploy-warm-404` — нарочно несуществующий,
            # триггерит компиляцию `/_not-found` route (без него
            # InvariantError для всех битых ссылок).
            if ! bash scripts/prewarm-routes.sh 2>&1; then
              echo "[prewarm] script failed — non-fatal, продолжаем"
            fi

            echo "=== Deploy complete ==="
